<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ADMINSPACE Terminal</title>
    <link rel="icon" href="/favicon.ico">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Courier New", monospace; 
            color: white;
        }
        
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .background-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .input-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;  
            align-items: center;
            padding: 20px;
        }

        .text-box {
            font-size: 18px;
            padding: 5px 10px;
            width: 400px;
            color: #6a6a6a;
        }
        
        .warning {
            font-size: 18px;
            color: #c20000;
            background-color: #ffffff;
        } 
        .admin-id {
            font-size: 18px;
            color: green;
            background-color: #ffffff;
        } 

        .send-btn {
            font-size: 18px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #888888;
            color: white;
            margin-top: 5px;
        }
        
        .center-img {
            width: 150px;     
            height: auto;
            margin-bottom: 10px;
        }
        
        .gui-img {
            margin-top: 10px;
            width: 500px;
            height: 500px;
        }
        
        .log-area {
            margin-top: 10px;
            width: 500px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            font-size: 16px;
            color: #ffffff;
        }

        .log-area p {
            margin: 5px 0;
        }
    </style>

</head>
<body>

<div class="warning">
   <p>WARNING: If you are using this terminal without an admin code close this page immediatedly</p>
</div>
<div class="admin-id">
   <p id=admin></p>
</div>
<audio id="music" src="https://raw.githubusercontent.com/MakeradamMc/voidexp-resources/main/voidSoundtracks/voidexp.ogg" autoplay loop></audio>

<div class="container">
    <img class="background-img" src="images/adminspacegui.png" alt="TheInfiniteVoid">
    <div class="input-area">
       <img src="images/adminspaceconsole.png" class="center-img" alt="AdminspaceTerminal">
       <input type="text" id="userInput" class="text-box" placeholder="e ADMINSPACE Command">
       <button class="send-btn" onclick="sendText()">Execute</button>
       <p>Output dei comandi:</p>
       <div class="log-area" id="logArea"></div>
    </div>
</div>


<script src="scripts/adminconsolerispostev2.js"></script>

<script src="scripts/adminconsolemain.js"></script>

</body>
</html>
