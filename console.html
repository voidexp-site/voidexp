<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Terminal</title>
    <link rel="icon" href="favicon.ico">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Courier New", monospace;
            color: white;
        }
        
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .background-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .input-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;  
            align-items: center;
            padding: 20px;
        }

        .text-box {
            font-size: 18px;
            padding: 5px 10px;
            width: 400px;
        }

        .send-btn {
            font-size: 18px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #888888;
            color: white;
            margin-top: 5px;
        }
        
        .center-img {
            width: 150px;     
            height: auto;
            margin-bottom: 10px;
        }
        
        .log-area {
            margin-top: 10px;
            width: 500px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            font-size: 16px;
            color: #ffffff;
        }

        .log-area p {
            margin: 5px 0;
        }
    <style>

</head>
<body>

<audio id="music" src="soundtracks/voidexp.ogg" autoplay loop></audio>

<div class="container">
    <img class="background-img" src="images/background.png" alt="TheInfiniteVoid">

    <div class="input-area">
       <img src="images/console.png" class="center-img" alt="Terminal">
       <input type="text" id="userInput" class="text-box" placeholder="Type RAW command">
       <button class="send-btn" onclick="sendText()">Execute</button>
       <p>Output dei comandi:</p>
       <div class="log-area" id="logArea"></div>
    </div>
</div>


<script src="scripts/consolerisposte.js"></script>

<script src="scripts/consolemain.js"></script>

</body>
</html>
