  <body>

    <h1>en_Void - Lunguaggio in codice</h1>
    
    <p>L'en_Void è un linguaggio in codice, con gli strumenti qua sotto puoi decompilare/compilare automaticamente una frase</p>
    
    <div id="compile">
    <textarea id="input" placeholder="Scrivi qui"></textarea>

    <button onclick="encode()">Compila</button>
    </div>
    
    <div id="decompile">
    <textarea id="output" placeholder="Risultato"></textarea>
    
    <button onclick="decode()">Decompila</button>
    </div>
    
    <p>Volete una versione stampabile del codice? cliccate qua</p>
    <a href="https://www.mediafire.com/file/6055adik8db21w2/en_void.png/file">en_Void.lang</a>

    <script>
    function encode() {
      const input = document.getElementById("input").value;
      document.getElementById("output").value = compileText(input);
    }

    function decode() {
      const input = document.getElementById("output").value;
      document.getElementById("input").value = decompileText(input);
    }
    </script>
    
    <script>

    const encodeMap = {
      "a": "⍂",
      "b": "⌗",
      "c": "⍀",
      "d": "⍽",
      "e": "⎖",
      "f": "☒",
      "g": "⚊",
      "h": "❰",
      "i": "▼",
      "j": "←",
      "k": "∶",
      "l": "⌙",
      "m": "⛛",
      "n": "ᚾ",
      "o": "ᛟ",
      "p": "〇",
      "q": "ᛩ",
      "r": "ᚱ",
      "s": "⑀",
      "t": "ᛏ",
      "u": "ᚢ",
      "v": "⚐",
      "w": "∑",
      "x": "∐",
      "y": "∏",
      "z": "⌓",
      "0": "⑨",
      "1": "⑪",
      "2": "⑦",
      "3": "③",
      "4": "②",
      "5": "④",
      "6": "①",
      "7": "⑥",
      "8": "⑤",
      "9": "⑧",

    };

    const decodeMap = Object.fromEntries(
      Object.entries(encodeMap).map(([k, v]) => [v, k])
    );


    function compileText(text) {
      return [...text].map(char => {
        if (char === " ") return " ";
        return encodeMap[char.toLowerCase()] || char;
      }).join("");
    }

    function decompileText(text) {
      return [...text].map(char => {
        if (char === " ") return " ";
        return decodeMap[char] || char;
      }).join("");
    }
    </script>
