         <input type="text" id="input" placeholder="Codice">

  <script>
    function controlla() {
        const risposta = document.getElementById("input").value.trim();
        const risultato = document.getElementById("risultato");
        const rispostaCorretta = "Adam ha raggiunto 2K iscritti su youtube";

        console.log("Risposta inserita:", risposta);
        console.log("Risposta corretta:", rispostaCorretta);
        console.log("Uguali?", risposta === rispostaCorretta);

        if (risposta === rispostaCorretta) {
            risultato.textContent = "Corretto, The end is near...";
            risultato.style.color = "green";
        } else {
            risultato.textContent = "Hmm... qualcosa non quadra...";
            risultato.style.color = "red";
        }
    }
  </script>
